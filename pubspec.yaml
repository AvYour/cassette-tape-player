name: cassette_tape_player
description: Skeuomorphic cassette tape music player with Spotify integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  spotify_sdk: 3.0.0
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  palette_generator: ^0.3.3
  audioplayers: ^6.1.0
  crypto: ^3.0.3
  url_launcher: ^6.3.0

# Vendored spotify_sdk: the published 3.0.0 still ships Flutter v1 embedding
# (PluginRegistry.Registrar), which no longer compiles on current Flutter.
# The local copy removes that dead v1 registration path.
dependency_overrides:
  spotify_sdk:
    path: third_party/spotify_sdk

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/sounds/
