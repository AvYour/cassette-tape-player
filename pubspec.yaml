name: cassette_tape_player
description: Skeuomorphic cassette tape music player with Spotify integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  spotify_sdk: ^2.3.0
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
